{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="form-card" style="margin-top: 4rem;">
    <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-sign-in-alt"></i> Вход</h3>
    {% if error %}<div style="background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem;">{{ error }}</div>{% endif %}
    {% if request.query_params.verified %}<div class="alert alert-success">Email успешно подтверждён, войдите.</div>{% endif %}
    <form method="post" action="/auth/login">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Войти</button>
    </form>
    <p style="margin-top: 1rem;">Нет аккаунта? <a href="/auth/register-page">Зарегистрироваться</a></p>
</div>
{% endblock %}
