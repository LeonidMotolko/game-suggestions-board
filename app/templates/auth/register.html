{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="form-card" style="margin-top: 4rem;">
    <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-user-plus"></i> Регистрация</h3>
    {% if error %}<div style="background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem;">{{ error }}</div>{% endif %}
    <form method="post" action="/auth/register">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Зарегистрироваться</button>
    </form>
    <p style="margin-top: 1rem;">Уже есть аккаунт? <a href="/auth/login-page">Войти</a></p>
</div>
{% endblock %}
